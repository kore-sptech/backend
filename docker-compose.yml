services:
  database:
    image: mysql:9
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"
    command: --bind-address=0.0.0.0
    volumes:
      - MYSQL_DATA:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
volumes:
  MYSQL_DATA: