changelog:
  categories:
    - title: 🚀 Novas Funcionalidades (New Features)
      labels: [feature] # PRs com label "feature" entram aqui (o que foi adicionado recentemente)
    - title: 📈 Melhorias (Improvements)
      labels: [improvement, enhancement] # PRs com ajustes e otimizações em recursos existentes
    - title: 🐛 Correções de Bugs (Bug Fixes)
      labels: [bug] # PRs com erros que foram identificados e resolvidos
    - title: ⚠️ Problemas Conhecidos (Known Issues)
      labels: [known-issue] # PRs com erros identificados que estão na fila de espera
